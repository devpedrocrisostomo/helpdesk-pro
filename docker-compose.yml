services:
  postgres:
    image: postgres:16-alpine
    container_name: helpdesk-pro-postgres
    environment:
      POSTGRES_DB: helpdeskpro
      POSTGRES_USER: helpdesk
      POSTGRES_PASSWORD: helpdesk
    ports:
      - "5433:5432"
    volumes:
      - helpdesk_pro_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helpdesk -d helpdeskpro"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
    container_name: helpdesk-pro-api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: helpdeskpro
      DB_USER: helpdesk
      DB_PASSWORD: helpdesk
      JWT_SECRET: ${JWT_SECRET:-dev-helpdesk-pro-jwt-secret-change-me-32-bytes-minimum}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-120}
      ADMIN_NAME: ${ADMIN_NAME:-HelpDesk Admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@helpdeskpro.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  helpdesk_pro_postgres_data:
